name: GHCR Cleanup
on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    uses: Ai-road-4-You/enterprise-ci-cd/.github/workflows/ghcr-cleanup.yml@main
    with:
      retention-days: 30
      keep-latest: 10
    secrets: inherit
